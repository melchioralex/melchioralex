name: generate animation

on:
  # roda automaticamente a cada 24 horas
  schedule:
    - cron: "0 */24 * * *" 
  
  # permite rodar manualmente a qualquer momento
  workflow_dispatch:
  
  # roda a cada push na branch main
  push:
    branches:
    - main
    
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # gera a animação da cobrinha
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: melchioralex
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # pega o arquivo gerado e joga para uma branch chamada 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
