name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" # roda a cada 24 horas
  workflow_dispatch: # permite rodar manualmente
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação com as cores neon e velocidade reduzida
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: melchioralex
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00FF41&color_dots=#111111,#003300,#008800,#00FF41,#CCFF00&speed=5
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00FF41&color_dots=#111111,#003300,#008800,#00FF41,#CCFF00&speed=5

      # Envia o arquivo para a branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
